<script>
//開始
$("#start").click(function () {

//[結束對話]
$('#END, #CHAT_END').click(function (e) { 
	e.preventDefault();
	
	var _href= $(this).attr('href');
	
	confirmModalDOM(`<div class="text-center">要結束對話嗎? 滿10輪才能得到評語喔!</div>`);
	
	$('#OK').click(function () { 
		window.location = _href;	
	});
});
	
//翻譯	
function TRANSLATE(button) { 
    // 判斷目前的按鈕狀態
    const currentState = $(button).attr('aria-expanded') === 'true';
    // 選取當前的翻譯顯示區塊
    const translateTarget = $(button).parents('.dialog').find('.dialog-translate');

    if (!currentState) {
        // 當前狀態為 false：顯示翻譯
        $(button).attr('aria-expanded', 'true');
        translateTarget.show();

        // 更新按鈕的屬性（隱藏翻譯）
        $(button).attr({
            'aria-label': '關閉翻譯',
            'title': '關閉翻譯'
        });
    } else {
        // 當前狀態為 true：隱藏翻譯
        $(button).attr('aria-expanded', 'false');
        translateTarget.hide();

        // 更新按鈕的屬性（顯示翻譯）
        $(button).attr({
            'aria-label': '開啟翻譯',
            'title': '開啟翻譯'
        });
    }
}
	
//[眼睛] 機器人/我說的話
function SCREENTEXT(button) {
    // 判斷目前的按鈕狀態
    const currentState = $(button).attr('aria-expanded');	
	// 選取當前的文字區塊
	const content = $(button).parents('.dialog').find('.dialog-text-content');

    if (currentState === 'true') { 
		// 當前、預設狀態是true-有眼睛-有顯示機器人說的話，要隱藏機器人說的話
		$(button).attr('aria-expanded', 'false'); 
		content.css('color', 'transparent');
		
		if ($(button).parents('.chatInterface-frame').hasClass('left')) {
			$(button).attr({
				'aria-label': '隱藏機器人說的話',
				'title': 	  '隱藏機器人說的話'
			});
		} else if ($(button).parents('.chatInterface-frame').hasClass('right')){
			$(button).attr({
				'aria-label': '隱藏我說的話',
				'title': 	  '隱藏我說的話'
			});
		}
		
    } else {  
		// 當前狀態(關閉眼睛)，要顯示機器人說的話
		$(button).attr('aria-expanded', 'true'); 
		content.css('color', '');
		
		if ($(button).parents('.chatInterface-frame').hasClass('left')) {
			$(button).attr({
				'aria-label': '顯示機器人說的話',
				'title': 	  '顯示機器人說的話'
			});	
		} else if ($(button).parents('.chatInterface-frame').hasClass('right')){
			$(button).attr({
				'aria-label': '顯示我說的話',
				'title': 	  '顯示我說的話'
			});	
		}
    }
}
	
//[對話] 可以這麼說
function SUGGEST(button) {
    // 判斷目前的按鈕狀態
    const currentState = $(button).attr('aria-expanded');	
	// 選取當前要控制的文字區塊
	const content = $(button).parents('.dialog').find('.dialog-suggest');

    if (currentState === 'true') { 
		// 當前、預設狀態是true-有...顯示可以這麼說，要關閉可以這麼說的文字
		$(button).attr('aria-expanded', 'false'); 
		content.addClass('hideText');
		
		$(button).attr({
			'aria-label': '關閉可以這麼說',
			'title': 	  '關閉可以這麼說'
		});
    } else {  
		// 當前狀態(無...)，要顯示可以這麼說的文字
		$(button).attr('aria-expanded', 'true'); 
		content.removeClass('hideText');
		
        $(button).attr({
			'aria-label': '開啟可以這麼說',
			'title': 	  '開啟可以這麼說'
		});
    }
}	
	
//模擬分析loading
function chat_analyze() {
    // 顯示 loading 畫面
    $('body').prepend(`
        <div id="spinner" class="spinner show">
			<div class="spinner-border" role="status">
			  <span class="visually-hidden-focusable">Loading...</span>
			</div>
		</div>
    `);

    // 模擬 loading 結束（例如 1 秒後）
    setTimeout(function () {
        // 移除 loading 畫面
        $('#spinner').remove();

        // 追加內容
        $('.chatInterface-content').append(`
            <div class="chatInterface-frame right">
                <div class="avatar"><span class="avatar-text">陳</span></div>

                        <div class="dialog-text-content">我喝牛奶</div>
                    </div>  
                </div>
            </div>
        `);

        // 捲軸捲動至最底部
        $('.futuristic-frame-content').animate({
			scrollTop: $('.futuristic-frame-content')[0].scrollHeight
		}, 500); 
		
		chat_robot();
    }, 1000); // 模擬 loading 時間：1 秒
}

var count = 0;		
function chat_robot() {	
	var content = `<div class="chatInterface-frame left">

											<div class="dialog-text-content">牛奶好喝嗎?</div>
										</div>
									</div>
								</div>`;
	
	count ++ ;
	if( count == 1){
	    // 顯示 loading 畫面
		$('body').prepend(`
			<div id="spinner" class="spinner show">
				<div class="spinner-border" role="status">
				  <span class="visually-hidden-focusable">Loading...</span>
				</div>
			</div>
		`);  
		
		// 模擬 loading 結束（例如 1 秒後）
		setTimeout(function () {
			// 移除 loading 畫面
			$('#spinner').remove();

			// 追加內容
			$('.chatInterface-content').append(content);

			// 捲軸捲動至最底部
			$('.futuristic-frame-content').animate({
				scrollTop: $('.futuristic-frame-content')[0].scrollHeight
			}, 500); 

		}, 1000); // 模擬 loading 時間：1 秒

	} else{
		// 顯示 loading 畫面
		loadingBotDOM(5000, '評語產生中，請稍後');	
		
		// 模擬 loading 結束（例如 1 秒後）
		setTimeout(function () {
			// 移除 loading 畫面
			$('#spinner').remove();

			// 追加內容
			$('.chatInterface-content').append(content);

			// 捲軸捲動至最底部
			$('.futuristic-frame-content').animate({
				scrollTop: $('.futuristic-frame-content')[0].scrollHeight
			}, 500); 
		}, 5000); // 模擬 loading 時間：1 秒
	}
}
