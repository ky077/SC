<script>
$(document).ready(function () {

	// 輸入名字
	$('#inputUser').on('input', function () {
		checkStartEnable();
	});

	// 選擇夥伴
	$('.start-btn-check').on('change', function () {
		checkStartEnable();

		if ($(this).is(':checked')) {
			const $label = $(`label[for="${this.id}"]`);
			let avatarImg = $label.find('.start-btn-img').html();
			const avatarName = $label.find('.start-btn-name').text();

			// 若是神秘嚮導（_guess）→ 換正式圖
			if (avatarImg.includes('_guess')) {
				avatarImg = avatarImg.replace(/_guess/g, '');
			}

			// 記錄目前夥伴頭像與名稱
			$('body').data('currentBotAvatar', avatarImg);
			$('body').data('currentBotName', avatarName);

			// 更新頁面上所有 bot 頭像
			$('.chatInterface-frame.left .avatar .avatar-img, .futuristic-frame-tool .avatar .avatar-img').html(avatarImg);

			// 更新上方名稱
			$('.futuristic-frame-tool .avatar-name label').text(avatarName);
		}
	});

	// [開始]
	$('#start').click(function () {
		if ($(this).prop('disabled')) return;

		$('.start-modal').hide();
		$('.header-logo').removeClass('zindex-modal');

		// 將目前輸入的名字首字同步到既有右側頭像
		updateUserAvatarText();

		// demo：開始後自動播放目前對話句子
		const $firstPlayBtn = $('.chatInterface-content .chatInterface-frame.left').last().find('.btn__playTitle').first();
		if ($firstPlayBtn.length) {
			$('.btn__record').prop('disabled', true);
			PLAYTITLE($firstPlayBtn[0], 'Content/temp/牛奶好喝嗎.mp3');
			
			setTimeout(function () {
					$('.btn__record').prop('disabled', false);
			}, 2500);
		}
	});

	// 頁面載入時先記錄預設夥伴頭像
	$('body').data(
		'currentBotAvatar',
		$('.futuristic-frame-tool .avatar .avatar-img').html()
	);
	$('body').data(
		'currentBotName',
		$('.futuristic-frame-tool .avatar-name label').text()
	);

	// 頁面載入初始化
	checkStartEnable();
	updateUserAvatarText();
	toggleRt();
	scrollToBottom();

	// [拼音]
	$('#switchCheckPinyin').on('change', function () {
		toggleRt();
	});

	// [結束對話]
	$('#END, #CHAT_END').click(function (e) {
		e.preventDefault();

		confirmModalDOM(`<div class="text-center">要結束對話嗎? </div>`);

		$('#OK').off('click').on('click', function () {

			const prevUrl = document.referrer;

			// 若沒有上一頁（極少，但要防）
			if (!prevUrl) {
				window.history.back();
				return;
			}

			// 是否完成對話（有評語）
			const isDone = chatAnalyzeCount >= 2;

			let targetUrl = prevUrl;

			if (isDone) {
				// 加上 done=1
				if (targetUrl.includes('?')) {
					targetUrl += '&done=1';
				} else {
					targetUrl += '?done=1';
				}
			}

			window.location = targetUrl;
		});
	});
});


// start 按鈕是否可用
function checkStartEnable() {
	const hasName = $('#inputUser').val().trim().length > 0;
	const hasPartner = $('[name="btnradio"]:checked').length > 0;

	$('#start').prop('disabled', !(hasName && hasPartner));
}


// 取得稱呼第一個字
function getUserInitial() {
	const name = $('#inputUser').val().trim();
	if (!name) return '';

	const firstChar = name.charAt(0);

	// 英文轉大寫
	if (/^[a-zA-Z]$/.test(firstChar)) {
		return firstChar.toUpperCase();
	}

	return firstChar;
}


// 更新既有右側使用者頭像文字
function updateUserAvatarText() {
	const userInitial = getUserInitial();
	$('.chatInterface-frame.right .avatar-text').text(userInitial);
}


// 取得目前夥伴頭像
function getCurrentBotAvatar() {
	return $('body').data('currentBotAvatar') ||
		'<img src="Content/images/bot/avatar_01.png" class="img-fluid" alt="狐狸偵查員頭像"/>';
}


// 拼音顯示切換
function toggleRt(target) {
	const $scope = target ? $(target) : $(document);

	if ($('#switchCheckPinyin').is(':checked')) {
		$scope.find('.dialog').addClass('show-rt').removeClass('hide-rt');
	} else {
		$scope.find('.dialog').addClass('hide-rt').removeClass('show-rt');
	}
}


// 卷軸捲到底
function scrollToBottom() {
	const $el = $('.futuristic-frame-content');
	if (!$el.length) return;

	$el.scrollTop($el[0].scrollHeight);
	$el.stop().animate({
		scrollTop: $el[0].scrollHeight
	}, 300);
}


var chatAnalyzeCount = 0;

// 模擬分析 loading
function chat_analyze() {
	chatAnalyzeCount++;

	const isFirstRound = chatAnalyzeCount === 1;
	const userInitial = getUserInitial();

	const rightMessageHtml = isFirstRound ? `
		<ruby><rb>不</rb><rt>bù</rt></ruby>
		<ruby><rb>好</rb><rt>hǎo</rt></ruby>
		<ruby><rb>喝</rb><rt>hē</rt></ruby>
	` : `
		<ruby><rb>我</rb><rt>wǒ</rt></ruby>
		<ruby><rb>喜</rb><rt>xǐ</rt></ruby>
		<ruby><rb>歡</rb><rt>huān</rt></ruby>
		<ruby><rb>吃</rb><rt>chī</rt></ruby>
		<ruby><rb>水</rb><rt>shuǐ</rt></ruby>
		<ruby><rb>果</rb><rt>guǒ</rt></ruby>
	`;

	const rightAudio = isFirstRound
		? 'Content/temp/不好喝.mp3'
		: 'Content/temp/我喜歡吃水果.mp3';

	$('body').prepend(`
		<div id="spinner" class="spinner show">
			<div class="spinner-border text-secondary" role="status">
				<span class="visually-hidden-focusable">Loading...</span>
			</div>
		</div>
	`);

	setTimeout(function () {
		$('#spinner').remove();

		const $newMessage = $(`
			<div class="chatInterface-frame right">
				<div class="avatar"><span class="avatar-text">${userInitial}</span></div>
				<div class="dialog">
					<div class="dialog-text">
						<button type="button" class="btn btn-link btn__playTitle" title="播放" onClick="PLAYTITLE(this, '${rightAudio}')">
							<span class="visually-hidden">播放</span>
						</button>
						<div class="dialog-text-content">
							${rightMessageHtml}
						</div>
					</div>
				</div>
			</div>
		`);

		$('.chatInterface-content').append($newMessage);

		toggleRt($newMessage);
		scrollToBottom();

		chat_robot(chatAnalyzeCount);
	}, 1000);
}
function chat_robot(step) {
	const currentBotAvatar = getCurrentBotAvatar();
	const isFirstRound = step === 1;

	const leftAudio = isFirstRound
		? 'Content/temp/你喜歡吃什麼.mp3'
		: 'Content/temp/評語.mp3';

	const $content = isFirstRound ? $(`
		<div class="chatInterface-frame left">
			<div class="avatar">
				<span class="avatar-img">${currentBotAvatar}</span>
			</div>
			<div class="dialog">
				<div class="dialog-text">
					<button type="button" class="btn btn-link btn__playTitle" title="播放" onClick="PLAYTITLE(this, 'Content/temp/你喜歡吃什麼.mp3')">
						<span class="visually-hidden">播放</span>
					</button>
					<div class="dialog-text-content">
						<ruby><rb>你</rb><rt>nǐ</rt></ruby>
						<ruby><rb>喜</rb><rt>xǐ</rt></ruby>
						<ruby><rb>歡</rb><rt>huān</rt></ruby>
						<ruby><rb>吃</rb><rt>chī</rt></ruby>
						<ruby><rb>什</rb><rt>shén</rt></ruby>
						<ruby><rb>麼</rb><rt>me</rt></ruby>
						<ruby><rb>？</rb><rt></rt></ruby>
					</div>
				</div>
			</div>
		</div>
	`) : $(`
		<div class="chatInterface-frame left">
			<div class="avatar">
				<span class="avatar-img">${currentBotAvatar}</span>
			</div>
			<div class="dialog">
				<div class="dialog-text">
					<button type="button" class="btn btn-link btn__playTitle" title="播放" onClick="PLAYTITLE(this, 'Content/temp/評語.mp3')">
						<span class="visually-hidden">播放</span>
					</button>
					<div class="dialog-text-content">
						評語：很好！可以說「我喜歡吃水果」。繼續加油，練習更多句子！
					</div>
				</div>
			</div>
		</div>
	`);

	if (isFirstRound) {
		$('body').prepend(`
			<div id="spinner" class="spinner show">
				<div class="spinner-border text-secondary" role="status">
					<span class="visually-hidden-focusable">Loading...</span>
				</div>
			</div>
		`);

		setTimeout(function () {
			$('#spinner').remove();
			$('.chatInterface-content').append($content);
			toggleRt($content);
			scrollToBottom();

			if (leftAudio) {
				const $playBtn = $content.find('.btn__playTitle').first();
				if ($playBtn.length) {
					$('.btn__record').prop('disabled', true);
					PLAYTITLE($playBtn[0], leftAudio);
					
					setTimeout(function () {
						if (chatAnalyzeCount < 2) {
							$('.btn__record').prop('disabled', false);
						}
					}, 2500);
				}
			}
		}, 1000);

	} else {
		loadingBotDOM(5000, '評語產生中，請稍後');

		setTimeout(function () {
			$('#spinner').remove();
			$('.chatInterface-content').append($content);
			toggleRt($content);
			scrollToBottom();
			$('.btn__record').prop('disabled', true);

			if (leftAudio) {
				const $playBtn = $content.find('.btn__playTitle').first();
				if ($playBtn.length) {
					PLAYTITLE($playBtn[0], leftAudio);
				}
			}
		}, 5000);
	}
}
	
	
</script>
</body>
</html>
